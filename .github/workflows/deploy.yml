name: Deploy SkillLeo to Hostinger
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: skillleo-website/package-lock.json

      - name: Install dependencies
        working-directory: skillleo-website
        run: npm ci

      - name: Build production bundle
        working-directory: skillleo-website
        run: npm run build

      - name: Clear old files on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            find ~/public_html -mindepth 1 \
              ! -name '.htaccess' \
              -delete

      - name: Upload dist via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "skillleo-website/dist/*"
          target: "~/public_html/"
          strip_components: 2
