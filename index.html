<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillLeo — Pakistan's #1 Agency Management Platform</title>
  <meta name="description" content="Pakistan's first enterprise-grade agency management platform. SECP registered. PSEB certified." />
  <link rel="canonical" href="https://skillleo.com/" />
  <!-- Instant redirect to website -->
  <meta http-equiv="refresh" content="0; url=/ui_kits/website/" />
  <script>
    // JS redirect as fastest fallback
    window.location.replace('/ui_kits/website/');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0F;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .logo { font-size: 28px; font-weight: 800; color: #2563EB; margin-bottom: 12px; }
    .sub { font-size: 14px; color: #64748B; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      background: #2563EB;
      margin: 16px auto;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <div>
    <div class="logo">SkillLeo</div>
    <div class="dot"></div>
    <div class="sub">Loading platform…</div>
  </div>
</body>
</html>
