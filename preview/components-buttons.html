<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-root); padding: 24px 32px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-sans); font-size: 14px; font-weight: 500; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; height: 40px; padding: 0 20px; border-radius: 8px; transition: all 0.2s; }
  .primary { background: var(--brand-primary); color: white; }
  .primary:hover { background: var(--brand-primary-hover); box-shadow: 0 0 24px rgba(37,99,235,0.3); }
  .secondary { background: rgba(255,255,255,0.06); color: var(--fg-primary); border: 1px solid rgba(255,255,255,0.1); }
  .ghost { background: transparent; color: var(--fg-secondary); border: 1px solid rgba(255,255,255,0.1); }
  .sm { height: 32px; font-size: 13px; padding: 0 14px; border-radius: 6px; }
  .lg { height: 48px; font-size: 16px; padding: 0 28px; border-radius: 10px; }
  .pill { border-radius: 9999px; }
</style>
</head><body>
  <button class="btn primary">Get Started</button>
  <button class="btn primary lg pill">Start Free Trial</button>
  <button class="btn secondary">View Our Work</button>
  <button class="btn ghost">Learn More</button>
  <button class="btn primary sm">Save</button>
  <button class="btn ghost sm">Cancel</button>
</body></html>
