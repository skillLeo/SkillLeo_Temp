<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-root); padding: 20px; display: flex; gap: 16px; align-items: flex-start; justify-content: center; }
  .logo-box { display: flex; align-items: center; justify-content: center; border-radius: 12px; padding: 16px; }
  .logo-box img { height: 40px; width: auto; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); text-align: center; margin-top: 6px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
</style>
</head><body>
  <div class="col"><div class="logo-box" style="background:#0A0A0F; border:1px solid rgba(255,255,255,0.08)"><img src="../assets/logo-horizontal-dark.png" /></div><span class="label">On dark</span></div>
  <div class="col"><div class="logo-box" style="background:#F8FAFC"><img src="../assets/logo-horizontal-light.png" /></div><span class="label">On light</span></div>
  <div class="col"><div class="logo-box" style="background:#2563EB"><img src="../assets/logo-horizontal-blue.png" /></div><span class="label">On blue</span></div>
  <div class="col"><div class="logo-box" style="background:#0A0A0F; border:1px solid rgba(255,255,255,0.08)"><img src="../assets/logo-icon-dark.png" style="height:44px" /></div><span class="label">Icon dark</span></div>
  <div class="col"><div class="logo-box" style="background:#2563EB"><img src="../assets/logo-icon-blue.png" style="height:44px" /></div><span class="label">Icon blue</span></div>
</body></html>
