<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-root); padding: 24px 32px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .badge { font-family: var(--font-sans); font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 9999px; }
  .blue { background: rgba(37,99,235,0.15); color: #3B82F6; border: 1px solid rgba(37,99,235,0.25); }
  .green { background: rgba(16,185,129,0.15); color: #10B981; border: 1px solid rgba(16,185,129,0.25); }
  .neutral { background: rgba(255,255,255,0.06); color: var(--fg-secondary); border: 1px solid rgba(255,255,255,0.08); }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head><body>
  <span class="badge blue"><span class="dot" style="background:#3B82F6"></span>SECP Registered</span>
  <span class="badge green"><span class="dot" style="background:#10B981"></span>PSEB Certified</span>
  <span class="badge neutral">SMC-Private Limited</span>
  <span class="badge blue">Inc. No. 0330718</span>
  <span class="badge neutral">25+ Experts</span>
  <span class="badge green"><span class="dot" style="background:#10B981"></span>Active</span>
</body></html>
