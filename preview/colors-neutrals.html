<!DOCTYPE html>
<html lang="en"><head>

<link rel="stylesheet" href="../colors_and_type.css">

  <div class="swatch" style="background:#2A2A3C"><span>600</span></div>
  <div class="swatch" style="background:#475569"><span>500</span></div>
  <div class="swatch" style="background:#64748B"><span>400</span></div>
  <div class="swatch" style="background:#94A3B8"><span>300</span></div>
  <div class="swatch" style="background:#CBD5E1"><span style="color:#0A0A0F">200</span></div>
