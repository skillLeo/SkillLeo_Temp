<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-root); padding: 24px 32px; display: flex; gap: 16px; align-items: flex-start; }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  label { font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--fg-secondary); }
  input, textarea { font-family: var(--font-sans); font-size: 14px; color: var(--fg-primary); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 14px; outline: none; }
  input:focus, textarea:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
  textarea { resize: none; height: 60px; }
  .hint { font-size: 12px; color: var(--fg-tertiary); }
</style>
</head><body>
  <div class="field"><label>Full Name</label><input value="Hassam Mehmood" /></div>
  <div class="field"><label>Email Address</label><input placeholder="you@skillleo.com" /><span class="hint">We'll never share your email</span></div>
  <div class="field"><label>Message</label><textarea placeholder="Tell us about your project..."></textarea></div>
</body></html>
