<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-root); padding: 24px 32px; display: flex; gap: 24px; align-items: center; }
  .group { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); width: 64px; height: 40px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); }
</style>
</head><body>
  <div class="group"><div class="box" style="border-radius:6px"></div><span class="label">6px sm</span></div>
  <div class="group"><div class="box" style="border-radius:8px"></div><span class="label">8px md</span></div>
  <div class="group"><div class="box" style="border-radius:12px"></div><span class="label">12px lg</span></div>
  <div class="group"><div class="box" style="border-radius:16px"></div><span class="label">16px xl</span></div>
  <div class="group"><div class="box" style="border-radius:24px"></div><span class="label">24px 2xl</span></div>
  <div class="group"><div class="box" style="border-radius:9999px"></div><span class="label">full</span></div>
</body></html>
